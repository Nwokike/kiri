{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="error-page-wrapper">
    <div class="error-page-content">
        <div class="error-page-logo-container">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="error-page-logo">
        </div>
        <h1 class="error-page-code">404</h1>
        <h2 class="error-page-title">Page Not Found</h2>
        <p class="error-page-desc">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{% url 'core:home' %}" class="btn-primary error-page-btn">
            <i class="fas fa-home pr-1"></i> Go Home
        </a>
    </div>
</body>

</html>
