{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="duration-300 min-h-screen py-20 container mx-auto py-8 text-body">
    <div class="text-center px-6">
        <div class="mb-8">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="dark:opacity-30 spacer-center opacity-50 w-auto">
        </div>
        <h1 class="mb-4 text-8xl font-bold text-muted">500</h1>
        <h2 class="text-xl font-bold text-heading-lg text-heading">Something Went Wrong</h2>
        <p class="mb-8 mx-auto text-muted max-w-md">
            We're experiencing some technical difficulties. Please try again later.
        </p>
        <a href="/" class="btn-primary gap-2 inline-flex items-center">
            <i class="fas fa-home pr-1"></i> Go Home
        </a>
    </div>
</body>

</html>
