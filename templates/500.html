{% load static %}
<!DOCTYPE html>
<html lang="en" class="k-h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="duration-300 k-error-container k-page-container text-body">
    <div class="k-text-center px-6">
        <div class="k-mb-8">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="dark:opacity-30 k-spacer-center opacity-50 w-auto">
        </div>
        <h1 class="k-mb-4 k-text-8xl k-text-muted-bold">500</h1>
        <h2 class="k-section-title-lg text-heading">Something Went Wrong</h2>
        <p class="k-mb-8 k-mx-auto k-text-muted-base max-w-md">
            We're experiencing some technical difficulties. Please try again later.
        </p>
        <a href="/" class="btn-primary k-gap-2 k-inline-flex k-items-center">
            <i class="fas fa-home pr-1"></i> Go Home
        </a>
    </div>
</body>

</html>
