<div class="field-group mb-5">
    {% if field.label %}
    <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-[#6C757D] dark:text-[#A1A1AA] mb-2">
        {{ field.label }}
        {% if field.field.required %}<span class="text-red-500 ml-1">*</span>{% endif %}
    </label>
    {% endif %}

    <div class="relative">
        {{ field }}
    </div>

    {% if field.help_text %}
    <p class="mt-2 text-xs text-[#6C757D] dark:text-[#A1A1AA]/70 leading-relaxed">{{ field.help_text|safe }}</p>
    {% endif %}

    {% if field.errors %}
    <div class="mt-2 space-y-1">
        {% for error in field.errors %}
        <p class="text-xs font-medium text-red-500 flex items-center gap-1">
            <i class="fas fa-exclamation-circle text-[10px]"></i>
            {{ error }}
        </p>
        {% endfor %}
    </div>
    {% endif %}
</div>
