{% load static %}
<!DOCTYPE html>
<html lang="en" class="k-h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="duration-300 k-error-container k-page-container text-body">
    <div class="k-text-center px-6">
        <div class="k-mb-8">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="dark:opacity-30 k-spacer-center opacity-50 w-auto">
        </div>
        <div class="bg-warning-subtle k-d-flex k-items-center k-justify-center k-mb-6 k-rounded-full k-spacer-center k-w-20">
            <i class="fa-wifi fas k-text-3xl text-kiri-gold"></i>
        </div>
        <h2 class="k-section-title-lg text-heading">You're Offline</h2>
        <p class="k-mb-8 k-mx-auto k-text-muted-base max-w-md">
            It looks like you've lost your internet connection. Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()" class="btn-primary k-gap-2 k-inline-flex k-items-center">
            <i class="fas fa-redo"></i> Try Again
        </button>
    </div>
</body>

</html>
