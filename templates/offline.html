{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="h-full k-page-container flex flex-col items-center justify-center bg-surface text-body transition-colors duration-300">
    <div class="text-center px-6">
        <div class="mb-8">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="h-20 w-auto mx-auto opacity-50 dark:opacity-30">
        </div>
        <div class="w-20 h-20 mx-auto mb-6 bg-warning-subtle rounded-full flex items-center justify-center">
            <i class="fas fa-wifi text-3xl text-kiri-gold"></i>
        </div>
        <h2 class="text-2xl font-semibold text-heading mb-2">You're Offline</h2>
        <p class="text-muted mb-8 max-w-md mx-auto">
            It looks like you've lost your internet connection. Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()" class="btn-primary inline-flex items-center gap-2">
            <i class="fas fa-redo"></i> Try Again
        </button>
    </div>
</body>

</html>
