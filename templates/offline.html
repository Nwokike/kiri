{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | Kiri</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/font-awesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <script src="{% static 'js/theme_init.js' %}"></script>
</head>

<body
    class="duration-300 min-h-screen py-20 container mx-auto py-8 text-body">
    <div class="text-center px-6">
        <div class="mb-8">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri"
                class="dark:opacity-30 spacer-center opacity-50 w-auto">
        </div>
        <div class="bg-warning-subtle flex items-center justify-center mb-6 rounded-full spacer-center w-20">
            <i class="fa-wifi fas text-3xl text-kiri-gold"></i>
        </div>
        <h2 class="text-xl font-bold text-heading-lg text-heading">You're Offline</h2>
        <p class="mb-8 mx-auto text-muted max-w-md">
            It looks like you've lost your internet connection. Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()" class="btn-primary gap-2 inline-flex items-center">
            <i class="fas fa-redo"></i> Try Again
        </button>
    </div>
</body>

</html>
