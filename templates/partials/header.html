{% load static %}
<!-- ===== HEADER ===== -->
<header class="page-header">
    <!-- Left: Hamburger + Logo -->
    <div class="flex items-center h-full">
        <button id="sidebar-toggle" class="icon-btn-large" title="Toggle sidebar">
            <i class="fas fa-bars text-lg"></i>
        </button>
        <a href="/" class="flex items-center h-full hover:bg-subtle transition-colors">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri" class="h-9 w-auto">
        </a>
    </div>

    <!-- Center: Spacer -->
    <div class="flex-1"></div>

    <!-- Right: Actions -->
    <div class="flex items-center h-full gap-1 pr-2">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
            <i class="fas fa-moon" id="theme-icon-light"></i>
            <i class="fas fa-sun text-yellow-400" id="theme-icon-dark"></i>
        </button>

        {% if user.is_authenticated %}
        <!-- Profile Dropdown -->
        <div class="relative" id="profile-dropdown-container">
            <button id="profile-dropdown-toggle" class="icon-btn" title="Profile menu">
                {% if user.avatar_url %}
                <img src="{{ user.avatar_url }}" alt="{{ user.username }}" class="w-8 h-8 rounded-full">
                {% else %}
                <div
                    class="w-8 h-8 rounded-full bg-gradient-to-br from-kiri-green to-kiri-green-dark text-white flex items-center justify-center text-xs font-semibold">
                    {{ user.username|slice:":2"|upper }}
                </div>
                {% endif %}
            </button>

            <!-- Dropdown Menu -->
            <div id="profile-dropdown" class="dropdown-menu hidden">
                <div class="p-3 divider border-t-0 border-b">
                    <p class="font-medium text-heading">{{ user.username }}</p>
                    <p class="text-xs text-muted">Staff</p>
                </div>
                <div class="py-2">
                    <a href="{% url 'core:about' %}" class="dropdown-item">
                        <i class="fas fa-user w-5 text-center"></i> About
                    </a>
                    <a href="{% url 'projects:create' %}" class="dropdown-item">
                        <i class="fas fa-plus w-5 text-center"></i> New Project
                    </a>
                    <a href="{% url 'socialaccount_connections' %}" class="dropdown-item">
                        <i class="fas fa-plug w-5 text-center"></i> Integrations
                    </a>
                    <div class="my-1 mx-3 divider"></div>
                    <a href="{% url 'account_logout' %}"
                        class="dropdown-item text-red-500 hover:text-red-600 hover:bg-subtle">
                        <i class="fas fa-sign-out-alt w-5 text-center"></i> Sign Out
                    </a>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</header>
