{% load static %}
<!-- ===== HEADER ===== -->
<header class="page-header">
    <!-- Left: Hamburger + Logo -->
    <div class="header-section">
        <button id="sidebar-toggle" class="icon-btn-large" title="Toggle sidebar">
            <i class="fa-bars fas text-lg"></i>
        </button>
        <a href="/" class="header-brand">
            <img src="{% static 'images/logos/logo.webp' %}" alt="Kiri" class="h-9 w-auto">
        </a>
    </div>

    <!-- Center: Spacer -->
    <div class="flex-1"></div>

    <!-- Right: Actions -->
    <div class="header-actions">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
            <i class="fas fa-moon" id="theme-icon-light"></i>
            <i class="fas fa-sun text-yellow-400" id="theme-icon-dark"></i>
        </button>

        {% if user.is_authenticated %}
        <!-- Profile Dropdown -->
        <div class="profile-dropdown-container" id="profile-dropdown-container">
            <button id="profile-dropdown-toggle" class="icon-btn" title="Profile menu">
                {% if user.avatar_url %}
                <img src="{{ user.avatar_url }}" alt="{{ user.username }}" class="h-8 rounded-full w-8">
                {% else %}
                <div class="avatar-fallback">
                    {{ user.username|slice:":2"|upper }}
                </div>
                {% endif %}
            </button>

            <!-- Dropdown Menu -->
            <div id="profile-dropdown" class="dropdown-menu hidden">
                <div class="dropdown-header">
                    <p class="dropdown-username">{{ user.username }}</p>
                    <p class="dropdown-role">Staff</p>
                </div>
                <div class="py-2">
                    <a href="{% url 'core:about' %}" class="dropdown-item">
                        <i class="fa-user fas text-center w-5"></i> About
                    </a>
                    <a href="{% url 'projects:create' %}" class="dropdown-item">
                        <i class="fa-plus fas text-center w-5"></i> New Project
                    </a>
                    <a href="{% url 'socialaccount_connections' %}" class="dropdown-item">
                        <i class="fa-plug fas text-center w-5"></i> Integrations
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="{% url 'account_logout' %}" class="dropdown-item-danger">
                        <i class="fa-sign-out-alt fas text-center w-5"></i> Sign Out
                    </a>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</header>
