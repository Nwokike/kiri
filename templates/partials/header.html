                <div class="avatar-fallback">
                    {{ user.username|slice:":2"|upper }}
                </div>
                {% endif %}
            </button>

            <div id="profile-dropdown" class="dropdown-menu hidden shadow-xl origin-top-right right-2 top-full mt-2">
                <div class="dropdown-header">
                    <p class="dropdown-username truncate">{{ user.username }}</p>
                    <p class="dropdown-role">Staff</p>
                </div>
                <div class="py-2">
                    <a href="{% url 'core:about' %}" class="dropdown-item">
                        <i class="fa-user fas text-center w-5"></i> About
                    </a>
                    <a href="{% url 'projects:create_manual' %}" class="dropdown-item">
                        <i class="fa-plus fas text-center w-5"></i> New Project
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="{% url 'logout' %}" class="dropdown-item-danger">
                        <i class="fa-sign-out-alt fas text-center w-5"></i> Sign Out
                    </a>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</header>

<!-- Spotlight Search Modal (Alpine.js) -->
<div x-data="searchModal()" 
     @keydown.window.prevent.cmd.k="openModal()" 
     @keydown.window.prevent.ctrl.k="openModal()"
     @keydown.escape.window="closeModal()">
    
    <!-- Modal Overlay -->
    <div x-show="isOpen" 
         x-transition.opacity.duration.300ms
         class="fixed inset-0 z-[100] flex items-start justify-center pt-16 sm:pt-24 bg-black/60 backdrop-blur-sm"
         style="display: none;">
         
        <!-- Modal Content -->
        <div x-show="isOpen" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             @click.away="closeModal()"
             class="bg-layer-1 w-full max-w-2xl mx-4 rounded-xl shadow-2xl border border-border-subtle overflow-hidden flex flex-col max-h-[80vh]">
            
            <!-- Search Input -->
            <div class="relative border-b border-border-subtle">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-text-muted text-lg"></i>
                <input type="text" x-model="query" x-ref="searchInput" @input.debounce.300ms="fetchResults()"
                       class="w-full bg-transparent border-0 px-12 py-4 text-white placeholder-text-muted focus:ring-0 outline-none text-lg"
                       placeholder="Search projects, tools, and publications...">
                <div x-show="isLoading" class="absolute right-4 top-1/2 -translate-y-1/2">
                    <i class="fas fa-circle-notch fa-spin text-text-muted"></i>
                </div>
            </div>

            <!-- Results Listing -->
            <div class="overflow-y-auto flex-1 custom-scrollbar p-2 min-h-[100px]">
                <template x-if="query.length > 0 && results.length === 0 && !isLoading">
                    <div class="p-8 text-center text-text-muted">
                        <i class="fas fa-search mb-3 text-2xl opacity-50"></i>
                        <p>No results found for "<span x-text="query"></span>"</p>
                    </div>
                </template>
                
                <template x-if="query.length === 0">
                    <div class="p-6 text-center text-text-muted opacity-70">
                        <p class="text-sm">Type to search across Kiri Research Labs</p>
                    </div>
                </template>
                
                <template x-for="(result, index) in results" :key="index">
                    <a :href="result.url" class="flex items-center gap-3 p-3 rounded-lg hover:bg-layer-2 transition-colors mb-1 group">
                        <div class="w-10 h-10 rounded bg-layer-3 border border-border-subtle flex items-center justify-center shrink-0 text-kiri-green">
                            <i class="fas" :class="result.icon"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between">
                                <h4 class="text-white text-sm font-semibold truncate group-hover:text-success" x-text="result.title"></h4>
                                <span class="text-[10px] tracking-wider uppercase text-text-muted bg-layer-3 px-2 py-0.5 rounded ml-2 shrink-0" x-text="result.type"></span>
                            </div>
                            <p class="text-text-muted text-xs truncate mt-0.5" x-text="result.description"></p>
                        </div>
                    </a>
                </template>
            </div>
            
            <!-- Footer -->
            <div class="border-t border-border-subtle p-3 bg-layer-2 hidden sm:flex text-xs text-text-muted items-center justify-between">
                <div>
                     <span class="mr-4"><kbd class="font-mono bg-layer-1 border border-border-subtle px-1.5 py-0.5 rounded shadow-sm">↑</kbd> <kbd class="font-mono bg-layer-1 border border-border-subtle px-1.5 py-0.5 rounded shadow-sm">↓</kbd> to navigate</span>
                     <span><kbd class="font-mono bg-layer-1 border border-border-subtle px-1.5 py-0.5 rounded shadow-sm">Enter</kbd> to select</span>
                </div>
                <span><kbd class="font-mono bg-layer-1 border border-border-subtle px-1.5 py-0.5 rounded shadow-sm">Esc</kbd> to close</span>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('searchModal', () => ({
            isOpen: false,
            query: '',
            results: [],
            isLoading: false,
            
            init() {
                const trigger = document.getElementById('search-modal-trigger');
                if (trigger) {
                    trigger.addEventListener('click', () => this.openModal());
                }
            },
            
            openModal() {
                this.isOpen = true;
                setTimeout(() => this.$refs.searchInput.focus(), 100);
            },
            
            closeModal() {
                this.isOpen = false;
                this.query = '';
                this.results = [];
            },
            
            async fetchResults() {
                if (this.query.trim() === '') {
                    this.results = [];
                    return;
                }
                
                this.isLoading = true;
                try {
                    const response = await fetch(`/api/search/?q=${encodeURIComponent(this.query)}`);
                    const data = await response.json();
                    this.results = data.results || [];
                } catch (error) {
                    console.error('Search error:', error);
                } finally {
                    this.isLoading = false;
                }
            }
        }));
    });
</script>
