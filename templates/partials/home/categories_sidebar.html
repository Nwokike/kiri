<!-- Categories -->
{% if categories %}
<div class="card p-6">
    <h3 class="flex items-center font-bold mb-4 text-sm text-heading tracking-wider uppercase">
        <i class="fa-tags fas text-muted"></i> Categories
    </h3>
    <div class="flex-wrap flex gap-2">
        {% for cat in categories %}
        <a href="{% url 'projects:list' %}?category={{ cat.category|urlencode }}"
            class="bg-subtle hover:bg-success-subtle hover:text-kiri-green font-bold rounded-lg text-xs transition-colors px-3 py-1.5 text-body">
            {{ cat.category|default:"Other" }}
            <span class="ml-1 opacity-50">{{ cat.count }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
