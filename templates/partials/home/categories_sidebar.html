<!-- Categories -->
{% if categories %}
<div class="card p-6">
    <h3 class="text-sm font-bold text-heading mb-4 flex items-center gap-2 uppercase tracking-wider">
        <i class="fas fa-tags text-muted"></i> Categories
    </h3>
    <div class="flex flex-wrap gap-2">
        {% for cat in categories %}
        <a href="{% url 'projects:list' %}?category={{ cat.category|urlencode }}"
            class="px-3 py-1.5 text-xs font-bold bg-subtle text-body rounded-lg hover:bg-success-subtle hover:text-kiri-green transition-colors">
            {{ cat.category|default:"Other" }}
            <span class="ml-1 opacity-50">{{ cat.count }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
