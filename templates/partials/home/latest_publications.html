{% load static %}
<!-- Latest Publications -->
{% if latest_publications %}
<section>
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-[#212529] dark:text-white flex items-center gap-2">
            <i class="fas fa-newspaper text-[#0D7C3D]"></i>
            Latest Publications
        </h2>
        <a href="{% url 'publications:list' %}" class="text-sm text-[#0D7C3D] hover:underline font-bold">
            View All <i class="fas fa-arrow-right ml-1"></i>
        </a>
    </div>
    <div class="space-y-4">
        {% for pub in latest_publications %}
        <a href="{% url 'publications:detail' pub.slug %}"
            class="group flex gap-5 p-5 bg-white rounded-xl border border-[#DEE2E6] hover:border-[#0D7C3D] hover:shadow-md transition-all dark:bg-[#1E1E1E] dark:border-[#333] dark:hover:border-[#0D7C3D]">
            <div
                class="w-12 h-12 shrink-0 bg-[#E8F5ED] dark:bg-[#0D7C3D]/10 rounded-xl flex items-center justify-center text-[#0D7C3D] transition-transform group-hover:scale-105">
                <i class="fas fa-file-alt text-lg"></i>
            </div>
            <div class="flex-1 min-w-0">
                <h3
                    class="text-base font-bold text-[#212529] dark:text-white mb-1 group-hover:text-[#0D7C3D] transition-colors truncate">
                    {{ pub.title }}
                </h3>
                <p class="text-xs font-bold text-[#6C757D] dark:text-[#A1A1AA]">
                    <span class="text-[#0D7C3D]">{{ pub.author.username }}</span> · {{ pub.created_at|date:"M d, Y" }}
                </p>
            </div>
            <i
                class="fas fa-chevron-right text-xs text-[#DEE2E6] group-hover:text-[#0D7C3D] self-center transition-colors"></i>
        </a>
        {% endfor %}
    </div>
</section>
{% endif %}
