<!-- Trending Projects -->
{% if trending_projects %}
<div class="card p-6">
    <h3 class="text-sm font-bold text-heading mb-5 flex items-center gap-2 uppercase tracking-wider">
        <i class="fas fa-chart-line text-kiri-gold"></i> Trending
    </h3>
    <div class="space-y-4">
        {% for project in trending_projects %}
        <a href="{% url 'projects:detail' project.slug %}" class="flex items-center gap-3 group">
            <span
                class="w-7 h-7 rounded-lg bg-subtle flex items-center justify-center text-xs font-black text-muted shrink-0">{{
                forloop.counter }}</span>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-heading truncate group-hover:text-kiri-green transition-colors">
                    {{ project.name }}
                </p>
                <p class="text-[10px] font-bold text-muted uppercase tracking-wider">
                    {{ project.view_count }} views · {{ project.stars_count }} ★
                </p>
            </div>
        </a>
        {% endfor %}
    </div>
    <a href="{% url 'projects:list' %}"
        class="block mt-4 pt-4 border-t border-subtle text-xs font-bold text-kiri-green hover:underline text-center">
        View All Projects →
    </a>
</div>
{% endif %}
