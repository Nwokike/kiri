{% load static %}
<!-- Trending Projects -->
{% if trending_projects %}
<div class="p-6 bg-white rounded-xl border border-[#DEE2E6] dark:bg-[#1E1E1E] dark:border-[#333]">
    <h3 class="text-md font-bold text-[#212529] dark:text-white mb-6 flex items-center gap-2">
        <i class="fas fa-chart-line text-[#C4992E]"></i>
        Trending Now
    </h3>
    <div class="space-y-4">
        {% for project in trending_projects %}
        <a href="{% url 'projects:detail' project.slug %}" class="flex items-center gap-4 group">
            <span
                class="text-xl font-black text-[#F8F9FA] dark:text-[#2D2D2D] group-hover:text-[#E8F5ED] transition-colors leading-none">{{ forloop.counter }}</span>
            <div class="flex-1 min-w-0">
                <p
                    class="text-sm font-bold text-[#212529] dark:text-white truncate group-hover:text-[#0D7C3D] transition-colors">
                    {{ project.name }}
                </p>
                <p class="text-[11px] font-bold text-[#ADB5BD] uppercase tracking-tighter">
                    {{ project.view_count }} Engagement points
                </p>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endif %}
