<!-- Trending Projects -->
{% if trending_projects %}
<div class="card p-6">
    <h3 class="k-flex-row-center k-font-bold k-text-sm mb-5 text-heading tracking-wider uppercase">
        <i class="fas fa-chart-line text-kiri-gold"></i> Trending
    </h3>
    <div class="k-stack-md">
        {% for project in trending_projects %}
        <a href="{% url 'projects:detail' project.slug %}" class="k-flex-row-center-md k-group">
            <span
                class="bg-subtle font-black h-7 k-d-flex k-items-center k-justify-center k-rounded-lg k-shrink-0 k-text-xs-muted w-7">{{ forloop.counter }}</span>
            <div class="k-flex-auto">
                <p class="group-hover:text-kiri-green k-font-bold k-text-sm k-transition-colors k-truncate text-heading">
                    {{ project.name }}
                </p>
                <p class="k-text-muted-bold text-[10px] tracking-wider uppercase">
                    {{ project.view_count }} views · {{ project.stars_count }} ★
                </p>
            </div>
        </a>
        {% endfor %}
    </div>
    <a href="{% url 'projects:list' %}"
        class="border-subtle border-t k-block k-font-bold k-hover-underline k-mt-4 k-text-center k-text-xs pt-4 text-kiri-green">
        View All Projects →
    </a>
</div>
{% endif %}
