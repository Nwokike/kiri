{% load static %}
{% load socialaccount %}
<!-- Mobile Bottom Nav -->
<nav
    class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-[#DEE2E6] z-50 dark:bg-[#1E1E1E] dark:border-[#3D3D3D] safe-area-pb shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
    <div class="grid grid-cols-4 h-full">
        <a href="{% url 'core:home' %}"
            class="flex flex-col items-center justify-center gap-1 {% if request.path == '/' %}text-[#0D7C3D]{% else %}text-[#6C757D] dark:text-[#A1A1AA]{% endif %}">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Home</span>
        </a>
        <a href="{% url 'projects:list' %}"
            class="flex flex-col items-center justify-center gap-1 {% if 'projects' in request.path %}text-[#0D7C3D]{% else %}text-[#6C757D] dark:text-[#A1A1AA]{% endif %}">
            <i class="fas fa-briefcase text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Projects</span>
        </a>
        <a href="{% url 'tools:index' %}"
            class="flex flex-col items-center justify-center gap-1 {% if 'tools' in request.path %}text-[#0D7C3D]{% else %}text-[#6C757D] dark:text-[#A1A1AA]{% endif %}">
            <i class="fas fa-toolbox text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Tools</span>
        </a>
        {% if user.is_authenticated %}
        <a href="{% url 'core:about' %}"
            class="flex flex-col items-center justify-center gap-1 {% if 'about' in request.path %}text-[#0D7C3D]{% else %}text-[#6C757D] dark:text-[#A1A1AA]{% endif %}">
            {% if user.avatar_url %}
            <img src="{{ user.avatar_url }}" alt="Avatar"
                class="w-5 h-5 rounded-full border border-[#DEE2E6] dark:border-[#333]">
            {% else %}
            <i class="fas fa-user-circle text-lg"></i>
            {% endif %}
            <span class="text-[9px] font-bold uppercase tracking-tighter">About</span>
        </a>
        {% else %}
        <a href="{% provider_login_url 'github' process='login' %}"
            class="flex flex-col items-center justify-center gap-1 text-[#0D7C3D]">
            <i class="fas fa-sign-in-alt text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Join</span>
        </a>
        {% endif %}
    </div>
</nav>
