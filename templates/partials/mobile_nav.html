{% load static %}
<!-- Mobile Bottom Nav -->
<nav class="mobile-nav">
    <div class="mobile-nav-grid">
        <a href="{% url 'core:home' %}"
            class="mobile-nav-item {% if request.path == '/' %}mobile-nav-item-active{% endif %}">
            <i class="fa-home fas mobile-nav-icon"></i>
            <span class="mobile-nav-label">Home</span>
        </a>
        <a href="{% url 'projects:list' %}"
            class="mobile-nav-item {% if 'projects' in request.path %}mobile-nav-item-active{% endif %}">
            <i class="fa-briefcase fas mobile-nav-icon"></i>
            <span class="mobile-nav-label">Projects</span>
        </a>
        <a href="{% url 'tools:index' %}"
            class="mobile-nav-item {% if 'tools' in request.path %}mobile-nav-item-active{% endif %}">
            <i class="fa-toolbox fas mobile-nav-icon"></i>
            <span class="mobile-nav-label">Tools</span>
        </a>
        <a href="{% url 'publications:list' %}"
            class="mobile-nav-item {% if 'publications' in request.path %}mobile-nav-item-active{% endif %}">
            <i class="fa-newspaper fas mobile-nav-icon"></i>
            <span class="mobile-nav-label">Pubs</span>
        </a>
        <a href="{% url 'core:about' %}"
            class="mobile-nav-item {% if 'about' in request.path %}mobile-nav-item-active{% endif %}">
            {% if user.is_authenticated and user.avatar_url %}
            <img src="{{ user.avatar_url }}" alt="Avatar" class="mobile-user-avatar">
            {% else %}
            <i class="fa-info-circle fas mobile-nav-icon"></i>
            {% endif %}
            <span class="mobile-nav-label">About</span>
        </a>
    </div>
</nav>
