<!-- Share Modal (Alpine.js) -->
<div 
    x-data="{ 
        open: false, 
        shareUrl: window.location.href,
        shareTitle: document.title,
        copySuccess: false,
        copyText() {
            navigator.clipboard.writeText(this.shareUrl);
            this.copySuccess = true;
            setTimeout(() => this.copySuccess = false, 2000);
        },
        shareOnX() {
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(this.shareTitle)}&url=${encodeURIComponent(this.shareUrl)}`, '_blank');
        },
        shareOnFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(this.shareUrl)}`, '_blank');
        },
        shareOnLinkedIn() {
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(this.shareUrl)}`, '_blank');
        },
        printPage() {
            window.print();
        }
    }"
    @open-share-modal.window="open = true; shareUrl = $event.detail.url || window.location.href; shareTitle = $event.detail.title || document.title"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6"
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    style="display: none;"
>
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" @click="open = false"></div>

    <!-- Modal Content -->
    <div 
        class="relative w-full max-w-sm overflow-hidden rounded-2xl bg-surface border border-subtle shadow-2xl"
        x-show="open"
        x-transition:enter="transition ease-out duration-300 transform"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 translate-y-4"
    >
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-heading">Share this work</h3>
                <button @click="open = false" class="text-muted hover:text-heading transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="grid grid-cols-4 gap-4 mb-8">
                <!-- X -->
                <button @click="shareOnX()" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-subtle border border-subtle group-hover:bg-heading group-hover:text-surface transition-all">
                        <i class="fab fa-x-twitter text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-muted">X</span>
                </button>

                <!-- LinkedIn -->
                <button @click="shareOnLinkedIn()" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-subtle border border-subtle group-hover:bg-[#0077b5] group-hover:text-white transition-all">
                        <i class="fab fa-linkedin-in text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-muted">LinkedIn</span>
                </button>

                <!-- Facebook -->
                <button @click="shareOnFacebook()" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-subtle border border-subtle group-hover:bg-[#1877f2] group-hover:text-white transition-all">
                        <i class="fab fa-facebook-f text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-muted">Facebook</span>
                </button>

                <!-- Print -->
                <button @click="printPage()" class="flex flex-col items-center gap-2 group">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-subtle border border-subtle group-hover:bg-kiri-green group-hover:text-white transition-all">
                        <i class="fas fa-print text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-muted">Print</span>
                </button>
            </div>

            <!-- Copy Link -->
            <div class="relative">
                <label class="text-[10px] font-bold uppercase tracking-widest text-muted mb-2 block">Direct Link</label>
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        readonly 
                        :value="shareUrl"
                        class="flex-1 bg-subtle border border-subtle rounded-lg px-3 py-2 text-xs text-body focus:outline-none"
                        @click="$el.select()"
                    >
                    <button 
                        @click="copyText()" 
                        class="flex items-center justify-center w-10 h-10 rounded-lg transition-all"
                        :class="copySuccess ? 'bg-success-subtle text-kiri-green' : 'bg-kiri-green text-white hover:opacity-90'"
                    >
                        <i class="fas" :class="copySuccess ? 'fa-check' : 'fa-copy'"></i>
                    </button>
                </div>
                <div 
                    x-show="copySuccess" 
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 -translate-y-2"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    class="absolute right-0 -bottom-6 text-[10px] font-bold text-kiri-green"
                >
                    Copied to clipboard!
                </div>
            </div>
        </div>
    </div>
</div>
