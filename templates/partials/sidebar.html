{% load static %}
<aside id="sidebar" class="sidebar">
    <nav class="sidebar-nav custom-scrollbar">
        <div class="sidebar-content-wrapper">
            <div class="sidebar-section-header">
                <span class="nav-label section-label transition-opacity duration-200">Explore</span>
            </div>

            <a href="{% url 'core:home' %}" class="nav-link {% if request.path == '/' %}nav-link-active{% endif %}">
                <i class="fa-home fas sidebar-icon"></i>
                <span class="nav-label nav-label-text">Home</span>
            </a>

            <a href="{% url 'projects:list' %}"
                class="nav-link {% if request.path == '/projects/' %}nav-link-active{% endif %}">
                <i class="fa-briefcase fas sidebar-icon"></i>
                <span class="nav-label nav-label-text flex-1">Projects</span>
            </a>
            
            {% if active_projects %}
            <div class="sidebar-subnav-container nav-label transition-opacity duration-200">
                {% for project in active_projects %}
                <a href="{% url 'projects:detail' project.slug %}" 
                   class="subnav-link {% if project.slug in request.path %}text-kiri-green{% endif %}">
                    <i class="fas fa-folder subnav-icon text-muted opacity-70"></i>
                    <span class="nav-label-text truncate">{{ project.name }}</span>
                </a>
                {% endfor %}
            </div>
            {% endif %}


            <div class="sidebar-section-header-top-bordered">
                <span class="nav-label section-label transition-opacity duration-200">Platform</span>
            </div>

            <a href="{% url 'core:about' %}"
                class="nav-link {% if 'about' in request.path %}nav-link-active{% endif %}">
                <i class="fa-info-circle fas sidebar-icon"></i>
                <span class="nav-label nav-label-text">About</span>
            </a>

            <!-- Ecosystem Platforms -->
            {% if ecosystem_platforms %}
            <div class="sidebar-section-header-top-bordered">
                <span class="nav-label section-label transition-opacity duration-200">Our Platforms</span>
            </div>
            {% for platform in ecosystem_platforms %}
            <a href="{{ platform.url }}" target="_blank" rel="noopener" class="nav-link">
                <i class="{{ platform.icon_class }} text-center text-sm w-5"></i>
                <span class="nav-label-text flex-1">{{ platform.name }}</span>
            </a>
            {% endfor %}
            {% endif %}
        </div>
    </nav>
</aside>
