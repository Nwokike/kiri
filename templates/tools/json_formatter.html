{% extends "base.html" %}
{% load static %}

{% block title %}JSON Formatter | Kiri Tools{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8" x-data="jsonTool()">
    <nav class="mb-6 text-sm flex items-center text-[#6C757D] dark:text-[#A1A1AA]">
        <a href="{% url 'tools:index' %}" class="hover:text-[#0D7C3D] transition-colors flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Tools
        </a>
        <span class="mx-2">/</span>
        <span class="text-[#212529] dark:text-white font-bold">JSON Formatter</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[calc(100vh-280px)]">
        <!-- Input -->
        <div class="flex flex-col h-full">
            <div class="mb-3 flex justify-between items-center">
                <label class="text-xs font-bold text-[#212529] dark:text-white uppercase tracking-widest">Raw
                    JSON</label>
                <div class="flex gap-4">
                    <button @click="sample()"
                        class="text-[10px] font-bold text-[#0D7C3D] hover:underline uppercase">Sample</button>
                    <button @click="input = ''"
                        class="text-[10px] font-bold text-red-500 hover:underline uppercase">Clear</button>
                </div>
            </div>
            <textarea x-model="input"
                class="flex-1 w-full p-6 font-mono text-sm border border-[#DEE2E6] dark:border-[#3D3D3D] rounded-xl focus:border-[#0D7C3D] focus:ring-4 focus:ring-[#0D7C3D]/10 bg-white dark:bg-[#1E1E1E] text-[#212529] dark:text-white resize-none transition-all outline-none"
                placeholder="Paste your JSON here..."></textarea>
        </div>

        <!-- Output -->
        <div class="flex flex-col h-full">
            <div class="mb-3 flex justify-between items-center">
                <label class="text-xs font-bold text-[#212529] dark:text-white uppercase tracking-widest">Formatted
                    Output</label>
                <div class="flex gap-4">
                    <button @click="minify()"
                        class="text-[10px] font-bold text-[#6C757D] hover:underline uppercase">Minify</button>
                    <button @click="copy()" class="text-[10px] font-bold text-[#0D7C3D] hover:underline uppercase"
                        x-text="copied ? 'Copied!' : 'Copy JSON'"></button>
                </div>
            </div>
            <div class="flex-1 relative overflow-hidden rounded-xl border border-[#DEE2E6] dark:border-[#3D3D3D]">
                <div id="json-output" class="w-full h-full bg-[#F8F9FA] dark:bg-[#121212] overflow-auto p-6">
                    <pre><code class="language-json" x-text="formattedOutput"></code></pre>
                </div>
                <div x-show="error"
                    class="absolute bottom-4 left-4 right-4 bg-red-100 text-red-700 px-4 py-2 rounded-lg text-xs font-bold border border-red-200">
                    <i class="fas fa-exclamation-circle mr-2"></i> <span x-text="error"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Prism for Highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

<style>
    .dark pre[class*="language-"],
    .dark code[class*="language-"] {
        background: transparent;
        color: #E4E4E7;
        text-shadow: none;
    }

    .dark .token.property {
        color: #9CDCFE;
    }

    .dark .token.string {
        color: #CE9178;
    }

    .dark .token.number {
        color: #B5CEA8;
    }

    .dark .token.boolean {
        color: #569CD6;
    }
</style>

<script>
    function jsonTool() {
        return {
            input: '',
            formattedOutput: '',
            error: '',
            copied: false,

            init() {
                this.$watch('input', () => this.format());
            },

            format() {
                this.error = '';
                if (!this.input.trim()) {
                    this.formattedOutput = '';
                    return;
                }
                try {
                    const parsed = JSON.parse(this.input);
                    this.formattedOutput = JSON.stringify(parsed, null, 4);
                    this.$nextTick(() => Prism.highlightAll());
                } catch (e) {
                    this.error = "Invalid JSON: " + e.message;
                    this.formattedOutput = this.input;
                }
            },

            minify() {
                try {
                    const parsed = JSON.parse(this.input);
                    this.formattedOutput = JSON.stringify(parsed);
                    this.$nextTick(() => Prism.highlightAll());
                } catch (e) {
                    this.error = "Invalid JSON for minification";
                }
            },

            sample() {
                this.input = JSON.stringify({
                    platform: "Kiri",
                    status: "online",
                    features: ["Studio", "Research", "Tools"],
                    stats: { users: 12000, projects: 450, uptime: "99.9%" },
                    author: { name: "Nwokike", role: "Elite Dev" }
                });
            },

            copy() {
                if (!this.formattedOutput || this.error) return;
                navigator.clipboard.writeText(this.formattedOutput);
                this.copied = true;
                setTimeout(() => this.copied = false, 2000);
            }
        }
    }
</script>
{% endblock %}
