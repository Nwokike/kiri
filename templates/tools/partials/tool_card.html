<a href="{% url url tool_slug=slug %}" class="group block h-full">
    <div
        class="h-full bg-surface border border-subtle rounded-xl p-6 hover:border-kiri-green hover:shadow-lg transition-all relative overflow-hidden flex flex-col">
        <div
            class="absolute top-0 right-0 w-24 h-24 {{ color_classes.bg_accent }} -mr-12 -mt-12 rounded-full transition-transform group-hover:scale-150">
        </div>

        <div
            class="w-12 h-12 mb-5 {{ color_classes.bg_icon }} rounded-lg flex items-center justify-center {{ color_classes.text_icon }} text-xl group-hover:scale-110 transition-transform">
            <i class="fas {{ icon }}"></i>
        </div>

        <h3 class="text-lg font-bold text-heading mb-2 group-hover:text-kiri-green transition-colors line-clamp-1">
            {{ name|safe }}
        </h3>

        <p class="text-body text-xs leading-relaxed mb-6 line-clamp-2">
            {{ desc }}
        </p>

        <div class="mt-auto flex items-center text-xs font-bold text-kiri-green border-t border-subtle pt-4">
            Launch Tool
            <i class="fas fa-chevron-right ml-2 group-hover:translate-x-1 transition-transform"></i>
        </div>
    </div>
</a>
