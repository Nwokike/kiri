{% extends "base.html" %}
{% load static %}

{% block title %}Unix Timestamp Converter | Kiri Tools{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8" x-data="timestampTool()">
    <nav class="mb-6 text-sm flex items-center text-[#6C757D] dark:text-[#A1A1AA]">
        <a href="{% url 'tools:index' %}" class="hover:text-[#0D7C3D] transition-colors flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Tools
        </a>
        <span class="mx-2">/</span>
        <span class="text-[#212529] dark:text-white font-bold">Unix Timestamp Converter</span>
    </nav>

    <div class="bg-white dark:bg-[#1E1E1E] border border-[#DEE2E6] dark:border-[#3D3D3D] rounded-xl p-8 shadow-sm">
        <div class="mb-12">
            <h2 class="text-xl font-bold text-[#212529] dark:text-white mb-6 uppercase tracking-wider">Current Time</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="p-6 bg-gray-50 dark:bg-[#252526] rounded-xl border border-[#DEE2E6] dark:border-[#3D3D3D]">
                    <div class="text-[10px] font-bold text-[#6C757D] dark:text-[#A1A1AA] uppercase mb-2">Unix Timestamp
                    </div>
                    <div class="text-2xl font-mono font-bold text-[#0D7C3D]" x-text="now"></div>
                </div>
                <div class="p-6 bg-gray-50 dark:bg-[#252526] rounded-xl border border-[#DEE2E6] dark:border-[#3D3D3D]">
                    <div class="text-[10px] font-bold text-[#6C757D] dark:text-[#A1A1AA] uppercase mb-2">ISO 8601</div>
                    <div class="text-sm font-mono font-bold text-[#212529] dark:text-white"
                        x-text="new Date().toISOString()"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <!-- Unix to Human -->
            <div>
                <h3 class="text-sm font-bold text-[#212529] dark:text-white mb-4 uppercase tracking-wider">Unix to Human
                </h3>
                <div class="space-y-4">
                    <input type="number" x-model="unixInput"
                        class="w-full p-4 font-mono text-sm border border-[#DEE2E6] dark:border-[#3D3D3D] rounded-xl focus:border-[#0D7C3D] focus:ring-4 focus:ring-[#0D7C3D]/10 bg-white dark:bg-[#1E1E1E] text-[#212529] dark:text-white outline-none"
                        placeholder="Enter Unix timestamp...">
                    <div
                        class="p-4 bg-[#F8F9FA] dark:bg-[#252526] rounded-xl border border-[#DEE2E6] dark:border-[#3D3D3D] min-h-[100px]">
                        <div class="text-[10px] font-bold text-[#6C757D] dark:text-[#A1A1AA] uppercase mb-2">Readable
                            Date (Local)</div>
                        <div class="text-sm font-bold text-[#212529] dark:text-white" x-text="unixToHuman"></div>
                    </div>
                </div>
            </div>

            <!-- Human to Unix -->
            <div>
                <h3 class="text-sm font-bold text-[#212529] dark:text-white mb-4 uppercase tracking-wider">Human to Unix
                </h3>
                <div class="space-y-4">
                    <input type="datetime-local" x-model="humanInput"
                        class="w-full p-4 font-mono text-sm border border-[#DEE2E6] dark:border-[#3D3D3D] rounded-xl focus:border-[#0D7C3D] focus:ring-4 focus:ring-[#0D7C3D]/10 bg-white dark:bg-[#1E1E1E] text-[#212529] dark:text-white outline-none">
                    <div
                        class="p-4 bg-[#F8F9FA] dark:bg-[#252526] rounded-xl border border-[#DEE2E6] dark:border-[#3D3D3D] min-h-[100px]">
                        <div class="text-[10px] font-bold text-[#6C757D] dark:text-[#A1A1AA] uppercase mb-2">Unix
                            Timestamp</div>
                        <div class="text-xl font-mono font-bold text-[#0D7C3D]" x-text="humanToUnix"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function timestampTool() {
        return {
            now: Math.floor(Date.now() / 1000),
            unixInput: Math.floor(Date.now() / 1000),
            humanInput: new Date().toISOString().slice(0, 16),

            init() {
                setInterval(() => {
                    this.now = Math.floor(Date.now() / 1000);
                }, 1000);
            },

            get unixToHuman() {
                if (!this.unixInput) return '-';
                try {
                    const date = new Date(this.unixInput * 1000);
                    return date.toString() !== 'Invalid Date' ? date.toLocaleString() : 'Invalid Timestamp';
                } catch (e) { return 'Error'; }
            },

            get humanToUnix() {
                if (!this.humanInput) return '-';
                try {
                    const date = new Date(this.humanInput);
                    return date.getTime() ? Math.floor(date.getTime() / 1000) : 'Invalid Date';
                } catch (e) { return 'Error'; }
            }
        }
    }
</script>
{% endblock %}
